; ============================================================
; ESP32 ILI9341 Dongle Display – PlatformIO Build Config
; Supports ESP32-C3 and ESP32-S3
; ============================================================

[platformio]
default_envs = esp32c3

; ---- Common settings shared by both boards ----------------
[common]
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.34
    bblanchon/ArduinoJson @ ^7.1.0

; Common TFT_eSPI driver flags (ILI9341 + XPT2046 touch)
build_flags_tft =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000

; ---- ESP32-C3 DevKitM-1 ----------------------------------
; Wiring (adjust to your board):
;   ILI9341  MOSI=GPIO7  MISO=GPIO2  SCK=GPIO6
;            CS=GPIO10   DC=GPIO4    RST=GPIO8   BL=GPIO3
;   XPT2046  T_CS=GPIO5  T_IRQ=GPIO9
[env:esp32c3]
extends = common
platform = espressif32
board = esp32-c3-devkitm-1
build_flags =
    ${common.build_flags_tft}
    -D TFT_MISO=2
    -D TFT_MOSI=7
    -D TFT_SCLK=6
    -D TFT_CS=10
    -D TFT_DC=4
    -D TFT_RST=8
    -D TFT_BL=3
    -D TOUCH_CS=5
    -D TOUCH_IRQ=9

; ---- ESP32-S3 DevKitC-1 ----------------------------------
; Wiring (adjust to your board):
;   ILI9341  MOSI=GPIO11 MISO=GPIO13 SCK=GPIO12
;            CS=GPIO10   DC=GPIO9    RST=GPIO14  BL=GPIO21
;   XPT2046  T_CS=GPIO46 T_IRQ=GPIO45
[env:esp32s3]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    ${common.build_flags_tft}
    -D TFT_MISO=13
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=14
    -D TFT_BL=21
    -D TOUCH_CS=46
    -D TOUCH_IRQ=45

; ---- ESP32-S3 Supermini ----------------------------------
; GPIO 45/46 are not exposed on Supermini; T_CS/T_IRQ use 15/16 instead.
; Wiring:
;   ILI9341  MOSI=GPIO11 MISO=GPIO13 SCK=GPIO12
;            CS=GPIO10   DC=GPIO9    RST=GPIO14  BL=GPIO21
;   XPT2046  T_CS=GPIO15 T_IRQ=GPIO16
[env:esp32s3_supermini]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    ${common.build_flags_tft}
    -D TFT_MISO=13
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=9
    -D TFT_RST=14
    -D TFT_BL=21
    -D TOUCH_CS=15
    -D TOUCH_IRQ=16
